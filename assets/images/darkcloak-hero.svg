<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-dc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <filter id="glow-dc">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="200" fill="url(#bg-dc)"/>
  <rect x="55" y="20" width="490" height="160" rx="8" fill="#0d0618" stroke="#3b82f6" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="55" y="20" width="490" height="26" rx="8" fill="#1a1025"/>
  <rect x="55" y="42" width="490" height="4" fill="#1a1025"/>
  <circle cx="73" cy="33" r="5" fill="#ff5555"/>
  <circle cx="89" cy="33" r="5" fill="#ffb86c"/>
  <circle cx="105" cy="33" r="5" fill="#50fa7b"/>
  <text x="300" y="37" fill="#60a5fa" font-family="monospace" font-size="9" text-anchor="middle">DARKCLOAK pipeline</text>
  <!-- Pipeline stages -->
  <g transform="translate(75, 60)">
    <rect x="0" y="0" width="90" height="40" rx="4" fill="#1a0a2e" stroke="#ff79c6" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="45" y="17" fill="#ff79c6" font-family="monospace" font-size="7" text-anchor="middle">UID/GID</text>
    <text x="45" y="30" fill="#6272a4" font-family="monospace" font-size="6" text-anchor="middle">setresuid</text>
    <line x1="94" y1="20" x2="114" y2="20" stroke="#50fa7b" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </line>
    <polygon points="114,20 110,17 110,23" fill="#50fa7b">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </polygon>
    <rect x="118" y="0" width="90" height="40" rx="4" fill="#1a0a2e" stroke="#bd93f9" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <text x="163" y="17" fill="#bd93f9" font-family="monospace" font-size="7" text-anchor="middle">Capabilities</text>
    <text x="163" y="30" fill="#6272a4" font-family="monospace" font-size="6" text-anchor="middle">capset</text>
    <line x1="212" y1="20" x2="232" y2="20" stroke="#50fa7b" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </line>
    <polygon points="232,20 228,17 228,23" fill="#50fa7b">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </polygon>
    <rect x="236" y="0" width="90" height="40" rx="4" fill="#1a0a2e" stroke="#8be9fd" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <text x="281" y="17" fill="#8be9fd" font-family="monospace" font-size="7" text-anchor="middle">comm/argv</text>
    <text x="281" y="30" fill="#6272a4" font-family="monospace" font-size="6" text-anchor="middle">prctl + mmap</text>
    <line x1="330" y1="20" x2="350" y2="20" stroke="#50fa7b" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </line>
    <polygon points="350,20 346,17 346,23" fill="#50fa7b">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </polygon>
    <rect x="354" y="0" width="90" height="40" rx="4" fill="#1a0a2e" stroke="#ffb86c" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
    <text x="399" y="17" fill="#ffb86c" font-family="monospace" font-size="7" text-anchor="middle">Namespaces</text>
    <text x="399" y="30" fill="#6272a4" font-family="monospace" font-size="6" text-anchor="middle">clone3</text>
  </g>
  <!-- Before/After -->
  <g font-family="monospace" font-size="8" transform="translate(75, 118)">
    <text x="0" y="0" fill="#6272a4">Before:</text>
    <text x="0" y="16" fill="#ff5555">PID 1337  uid=1000  /tmp/malware  "malware --exfil"</text>
    <text x="0" y="38" fill="#6272a4">After:</text>
    <text x="0" y="54" fill="#50fa7b">PID 1337  uid=0     /usr/sbin/sshd  "sshd: root@pts/0"</text>
  </g>
</svg>
