<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#0f0a18"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="560" height="180" fill="url(#bg3)"/>
  
  <!-- Left side: Network incoming -->
  <g transform="translate(30, 30)">
    <rect width="140" height="120" rx="6" fill="#0d0620" stroke="#a855f7" stroke-width="1.5"/>
    <rect width="140" height="20" rx="6" fill="#2d1b4e"/>
    <rect y="17" width="140" height="3" fill="#2d1b4e"/>
    <text x="70" y="14" fill="#c084fc" font-family="monospace" font-size="8" text-anchor="middle">sender.py</text>
    
    <g font-family="monospace" font-size="8">
      <text x="10" y="36" fill="#6b4d9a">s = socket()</text>
      <text x="10" y="50" fill="#6b4d9a">s.connect()</text>
      <text x="10" y="64" fill="#a855f7">s.sendall(size)</text>
      <text x="10" y="78" fill="#ff00ff">s.sendall(ELF)</text>
    </g>
    
    <!-- ELF binary representation -->
    <rect x="10" y="88" width="120" height="24" rx="3" fill="#1a0a2a" stroke="#c084fc" stroke-width="1"/>
    <text x="18" y="100" fill="#4a3060" font-family="monospace" font-size="6">7f 45 4c 46</text>
    <text x="18" y="108" fill="#4a3060" font-family="monospace" font-size="6">02 01 01 00 ...</text>
    <text x="118" y="104" fill="#c084fc" font-family="monospace" font-size="7" text-anchor="end">ELF</text>
  </g>
  
  <!-- Center: animated data stream -->
  <g filter="url(#glow3)">
    <line x1="180" y1="90" x2="240" y2="90" stroke="#ff00ff" stroke-width="3" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="12;0" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <polygon points="240,90 232,84 232,96" fill="#ff00ff"/>
  </g>
  
  <!-- Center: the memfd concept -->
  <g transform="translate(248, 28)">
    <!-- Anonymous file box -->
    <rect width="70" height="80" rx="5" fill="#0a1a10" stroke="#10b981" stroke-width="2" filter="url(#softglow)">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- RAM bars inside -->
    <rect x="8" y="8" width="54" height="6" rx="1" fill="#10b981" opacity="0.3"/>
    <rect x="8" y="18" width="54" height="6" rx="1" fill="#10b981" opacity="0.5"/>
    <rect x="8" y="28" width="54" height="6" rx="1" fill="#10b981" opacity="0.7"/>
    <rect x="8" y="38" width="54" height="6" rx="1" fill="#10b981" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="48" width="54" height="6" rx="1" fill="#10b981" opacity="0.7"/>
    <rect x="8" y="58" width="54" height="6" rx="1" fill="#10b981" opacity="0.4"/>
    <rect x="8" y="68" width="54" height="6" rx="1" fill="#10b981" opacity="0.2"/>
    
    <text x="35" y="98" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">memfd</text>
    <text x="35" y="110" fill="#0f6a4a" font-family="monospace" font-size="6" text-anchor="middle">anon tmpfs</text>
    
    <!-- Disk crossed out below -->
    <g transform="translate(10, 118)">
      <rect width="50" height="20" rx="3" fill="#1a0808" stroke="#ff5f56" stroke-width="1" opacity="0.6"/>
      <text x="25" y="14" fill="#ff5f56" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.8">DISK</text>
      <line x1="2" y1="2" x2="48" y2="18" stroke="#ff5f56" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Arrow to exec -->
  <g filter="url(#glow3)">
    <line x1="326" y1="68" x2="370" y2="68" stroke="#00ff88" stroke-width="3" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" values="12;0" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <polygon points="370,68 362,62 362,74" fill="#00ff88"/>
  </g>
  
  <!-- Right: Execution result -->
  <g transform="translate(380, 30)">
    <rect width="160" height="120" rx="6" fill="#0d0620" stroke="#00b4d8" stroke-width="1.5"/>
    <rect width="160" height="20" rx="6" fill="#0d3050"/>
    <rect y="17" width="160" height="3" fill="#0d3050"/>
    <text x="80" y="14" fill="#48cae4" font-family="monospace" font-size="8" text-anchor="middle">victim</text>
    
    <g font-family="monospace" font-size="8">
      <text x="10" y="36" fill="#6b4d9a">clone3()</text>
      <text x="10" y="50" fill="#6b4d9a">setsid()</text>
      <text x="10" y="64" fill="#00b4d8">dup3(0,1,2→sock)</text>
      
      <rect x="8" y="70" width="144" height="18" rx="3" fill="#0a2a1a" stroke="#00ff88" stroke-width="1.5" filter="url(#glow3)">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text x="80" y="83" fill="#00ff88" font-size="9" text-anchor="middle" font-weight="bold">execveat(fd, "")</text>
      
      <text x="10" y="104" fill="#10b981">→ ELF running</text>
      <text x="10" y="118" fill="#4a6a5a">→ no file on disk</text>
    </g>
  </g>
</svg>
