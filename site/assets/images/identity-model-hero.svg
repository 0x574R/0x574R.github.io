<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-id" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <filter id="glow-id">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="220" fill="url(#bg-id)"/>
  
  <!-- task_struct box -->
  <g transform="translate(45, 30)">
    <rect width="168" height="160" rx="6" fill="#0d0618" stroke="#60a5fa" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="84" y="20" fill="#60a5fa" font-family="monospace" font-size="10" text-anchor="middle" filter="url(#glow-id)">task_struct</text>
    
    <g font-family="monospace" font-size="8">
      <text x="16" y="44" fill="#6272a4">pid_t pid</text>
      <text x="16" y="58" fill="#6272a4">char comm[]</text>
      <text x="16" y="72" fill="#6272a4">...</text>
      
      <!-- cred pointer highlighted -->
      <rect x="12" y="78" width="144" height="28" rx="3" fill="#1a0a2e" stroke="#bd93f9" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="18" y="92" fill="#ff79c6">const struct cred</text>
      <text x="18" y="103" fill="#bd93f9">  *real_cred</text>
      
      <rect x="12" y="110" width="144" height="28" rx="3" fill="#1a0a2e" stroke="#bd93f9" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
      <text x="18" y="124" fill="#ff79c6">const struct cred</text>
      <text x="18" y="135" fill="#bd93f9">  *cred</text>
      
      <text x="16" y="152" fill="#6272a4">...</text>
    </g>
  </g>
  
  <!-- Arrow -->
  <line x1="218" y1="110" x2="260" y2="110" stroke="#bd93f9" stroke-width="1.5" stroke-dasharray="4,3">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="260,110 254,106 254,114" fill="#bd93f9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- struct cred box -->
  <g transform="translate(268, 18)">
    <rect width="296" height="184" rx="6" fill="#0d0618" stroke="#bd93f9" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="148" y="20" fill="#bd93f9" font-family="monospace" font-size="10" text-anchor="middle" filter="url(#glow-id)">struct cred</text>
    
    <!-- UIDs section -->
    <g transform="translate(14, 32)">
      <rect width="128" height="72" rx="4" fill="#0a1628" stroke="#3b82f6" stroke-width="0.8" opacity="0.8"/>
      <text x="64" y="14" fill="#60a5fa" font-family="monospace" font-size="8" text-anchor="middle">UIDs</text>
      <g font-family="monospace" font-size="7.5">
        <text x="10" y="30" fill="#50fa7b">uid</text>
        <text x="54" y="30" fill="#f8f8f2">= 0</text>
        <text x="10" y="42" fill="#50fa7b">euid</text>
        <text x="54" y="42" fill="#f8f8f2">= 0</text>
        <text x="10" y="54" fill="#50fa7b">suid</text>
        <text x="54" y="54" fill="#f8f8f2">= 0</text>
        <text x="10" y="66" fill="#50fa7b">fsuid</text>
        <text x="54" y="66" fill="#6272a4">= 0</text>
      </g>
    </g>
    
    <!-- GIDs section -->
    <g transform="translate(154, 32)">
      <rect width="128" height="72" rx="4" fill="#0a1628" stroke="#3b82f6" stroke-width="0.8" opacity="0.8"/>
      <text x="64" y="14" fill="#60a5fa" font-family="monospace" font-size="8" text-anchor="middle">GIDs</text>
      <g font-family="monospace" font-size="7.5">
        <text x="10" y="30" fill="#50fa7b">gid</text>
        <text x="54" y="30" fill="#f8f8f2">= 0</text>
        <text x="10" y="42" fill="#50fa7b">egid</text>
        <text x="54" y="42" fill="#f8f8f2">= 0</text>
        <text x="10" y="54" fill="#50fa7b">sgid</text>
        <text x="54" y="54" fill="#f8f8f2">= 0</text>
        <text x="10" y="66" fill="#50fa7b">fsgid</text>
        <text x="54" y="66" fill="#6272a4">= 0</text>
      </g>
    </g>
    
    <!-- Capabilities section -->
    <g transform="translate(14, 112)">
      <rect width="268" height="62" rx="4" fill="#0a1628" stroke="#ffb86c" stroke-width="0.8" opacity="0.8">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" begin="1s" repeatCount="indefinite"/>
      </rect>
      <text x="134" y="14" fill="#ffb86c" font-family="monospace" font-size="8" text-anchor="middle">Capabilities</text>
      <g font-family="monospace" font-size="7.5">
        <text x="10" y="30" fill="#50fa7b">cap_permitted</text>
        <text x="112" y="30" fill="#f8f8f2">= 0x3ffffffffff</text>
        <text x="10" y="42" fill="#50fa7b">cap_effective</text>
        <text x="112" y="42" fill="#f8f8f2">= 0x3ffffffffff</text>
        <text x="10" y="54" fill="#50fa7b">securebits</text>
        <text x="112" y="54" fill="#f8f8f2">= 0x00</text>
      </g>
    </g>
  </g>
</svg>
