<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0014"/>
      <stop offset="100%" style="stop-color:#1a0033"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Fondo -->
  <rect width="560" height="180" fill="url(#bg)"/>
  
  <!-- Terminal ATTACKER -->
  <rect x="20" y="20" width="190" height="140" rx="8" fill="#0d0620" stroke="#a855f7" stroke-width="2"/>
  <rect x="20" y="20" width="190" height="24" rx="8" fill="#2d1b4e"/>
  <rect x="20" y="40" width="190" height="4" fill="#2d1b4e"/>
  <circle cx="36" cy="32" r="5" fill="#ff5f56"/>
  <circle cx="52" cy="32" r="5" fill="#ffbd2e"/>
  <circle cx="68" cy="32" r="5" fill="#27ca40"/>
  <text x="115" y="36" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">ATTACKER</text>
  
  <g font-family="monospace" font-size="10">
    <text x="32" y="62" fill="#a855f7">$</text>
    <text x="42" y="62" fill="#ff00ff">python3 sender.py</text>
    <text x="32" y="78" fill="#6b4d9a">[*] size: 8.2MB</text>
    <text x="32" y="94" fill="#00ff88">[+] sending ELF...</text>
    <text x="32" y="110" fill="#00ff88">[+] sent!</text>
    <text x="32" y="126" fill="#6b4d9a">[*] waiting...</text>
    <text x="32" y="142" fill="#00ffff">session opened</text>
  </g>
  
  <!-- Flecha ELF volando -->
  <g filter="url(#glow)">
    <line x1="220" y1="72" x2="330" y2="72" stroke="#ff00ff" stroke-width="3" stroke-dasharray="10,5">
      <animate attributeName="stroke-dashoffset" values="15;0" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <polygon points="330,72 320,65 320,79" fill="#ff00ff"/>
  </g>
  <text x="275" y="65" fill="#c084fc" font-family="monospace" font-size="9" text-anchor="middle">ELF binary</text>
  
  <!-- Icono RAM -->
  <rect x="255" y="95" width="40" height="22" rx="4" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <text x="275" y="110" fill="#00ff88" font-family="monospace" font-size="9" text-anchor="middle">RAM</text>
  <line x1="275" y1="80" x2="275" y2="95" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- No disk icon -->
  <text x="275" y="135" fill="#ff5f56" font-family="monospace" font-size="9" text-anchor="middle">∅ disk</text>
  
  <!-- Terminal VICTIM -->
  <rect x="340" y="20" width="200" height="140" rx="8" fill="#0d0620" stroke="#00b4d8" stroke-width="2"/>
  <rect x="340" y="20" width="200" height="24" rx="8" fill="#0d3050"/>
  <rect x="340" y="40" width="200" height="4" fill="#0d3050"/>
  <circle cx="356" cy="32" r="5" fill="#ff5f56"/>
  <circle cx="372" cy="32" r="5" fill="#ffbd2e"/>
  <circle cx="388" cy="32" r="5" fill="#27ca40"/>
  <text x="440" y="36" fill="#48cae4" font-family="monospace" font-size="10" text-anchor="middle">VICTIM</text>
  
  <g font-family="monospace" font-size="10">
    <text x="352" y="62" fill="#00b4d8">$</text>
    <text x="362" y="62" fill="#00ffff">./loader</text>
    <text x="352" y="78" fill="#6b4d9a">[*] listening :4444</text>
    <text x="352" y="94" fill="#00ff88">[+] recv 8.2MB</text>
    <text x="352" y="110" fill="#6b4d9a">[*] memfd_create()</text>
    <text x="352" y="126" fill="#6b4d9a">[*] mmap(SHARED)</text>
    <text x="352" y="142" fill="#00ff88">[+] execveat(fd)</text>
  </g>
</svg>
