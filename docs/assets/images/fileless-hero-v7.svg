<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0014"/>
      <stop offset="100%" style="stop-color:#1a0033"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="560" height="180" fill="url(#bg7)"/>
  
  <!-- Divider line -->
  <line x1="280" y1="55" x2="280" y2="175" stroke="#3d2d5a" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  
  <!-- clone3 fork point at top center -->
  <g transform="translate(230, 8)">
    <rect width="100" height="32" rx="5" fill="#1a0a2a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="50" y="14" fill="#a855f7" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">clone3</text>
    <text x="50" y="26" fill="#4a3060" font-family="monospace" font-size="6" text-anchor="middle">SIGCHLD</text>
  </g>
  
  <!-- Fork arrows -->
  <path d="M 255 40 L 255 50 Q 255 56 249 56 L 140 56" stroke="#a855f7" stroke-width="1.2" fill="none"/>
  <polygon points="140,56 146,53 146,59" fill="#a855f7"/>
  <path d="M 305 40 L 305 50 Q 305 56 311 56 L 420 56" stroke="#a855f7" stroke-width="1.2" fill="none"/>
  <polygon points="420,56 414,53 414,59" fill="#a855f7"/>
  
  <!-- Left labels -->
  <text x="140" y="50" fill="#4a3060" font-family="monospace" font-size="7" text-anchor="middle">PADRE (rax > 0)</text>
  <text x="420" y="50" fill="#4a3060" font-family="monospace" font-size="7" text-anchor="middle">HIJO (rax == 0)</text>
  
  <!-- LEFT: Parent process - accept loop -->
  <g transform="translate(20, 60)">
    <rect width="240" height="108" rx="6" fill="#0d0d14" stroke="#00b4d8" stroke-width="1" opacity="0.7"/>
    <text x="120" y="18" fill="#00b4d8" font-family="monospace" font-size="8" text-anchor="middle">accept_loop</text>
    
    <!-- Loop visualization -->
    <g font-family="monospace" font-size="7.5">
      <rect x="15" y="28" width="90" height="22" rx="3" fill="#0d1a28" stroke="#00b4d8" stroke-width="0.8"/>
      <text x="60" y="42" fill="#48cae4" text-anchor="middle">accept(43)</text>
      
      <line x1="109" y1="39" x2="125" y2="39" stroke="#00b4d8" stroke-width="1"/>
      <polygon points="125,39 121,36 121,42" fill="#00b4d8"/>
      
      <rect x="129" y="28" width="96" height="22" rx="3" fill="#0d1a28" stroke="#00b4d8" stroke-width="0.8"/>
      <text x="177" y="42" fill="#48cae4" text-anchor="middle">→ clone3()</text>
      
      <!-- Loop back arrow -->
      <path d="M 177 50 L 177 62 Q 177 68 171 68 L 55 68 Q 49 68 49 62 L 49 54" stroke="#00b4d8" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
      <polygon points="49,54 46,59 52,59" fill="#00b4d8"/>
      
      <text x="113" y="78" fill="#0d3050" font-family="monospace" font-size="6" text-anchor="middle">∞ loop</text>
    </g>
    
    <text x="120" y="100" fill="#0d3050" font-family="monospace" font-size="6.5" text-anchor="middle">siempre disponible para nuevos payloads</text>
  </g>
  
  <!-- RIGHT: Child process - fileless pipeline -->
  <g transform="translate(300, 60)">
    <rect width="245" height="108" rx="6" fill="#0a0f14" stroke="#10b981" stroke-width="1"/>
    <text x="122" y="18" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">child pipeline</text>
    
    <g font-family="monospace" font-size="7">
      <!-- setsid -->
      <rect x="8" y="26" width="52" height="18" rx="2" fill="#1a0a2a" stroke="#6b4d9a" stroke-width="0.6"/>
      <text x="34" y="38" fill="#6b4d9a" text-anchor="middle">setsid</text>
      
      <line x1="64" y1="35" x2="70" y2="35" stroke="#6b4d9a" stroke-width="0.8"/>
      <polygon points="70,35 67,33 67,37" fill="#6b4d9a"/>
      
      <!-- recvfrom -->
      <rect x="74" y="26" width="50" height="18" rx="2" fill="#0d1a28" stroke="#00b4d8" stroke-width="0.6"/>
      <text x="99" y="38" fill="#48cae4" text-anchor="middle">recv</text>
      
      <line x1="128" y1="35" x2="134" y2="35" stroke="#10b981" stroke-width="0.8"/>
      <polygon points="134,35 131,33 131,37" fill="#10b981"/>
      
      <!-- memfd_create -->
      <rect x="138" y="26" width="56" height="18" rx="2" fill="#0a1a10" stroke="#10b981" stroke-width="0.8">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="166" y="38" fill="#10b981" text-anchor="middle">memfd</text>
      
      <line x1="198" y1="35" x2="204" y2="35" stroke="#eab308" stroke-width="0.8"/>
      
      <!-- ftruncate + mmap -->
      <rect x="8" y="50" width="60" height="18" rx="2" fill="#1a1a0f" stroke="#eab308" stroke-width="0.6"/>
      <text x="38" y="62" fill="#eab308" text-anchor="middle">ftruncate</text>
      
      <line x1="72" y1="59" x2="78" y2="59" stroke="#eab308" stroke-width="0.8"/>
      
      <rect x="82" y="50" width="66" height="18" rx="2" fill="#1a1a0f" stroke="#eab308" stroke-width="0.6"/>
      <text x="115" y="62" fill="#facc15" text-anchor="middle">mmap SHARED</text>
      
      <line x1="152" y1="59" x2="158" y2="59" stroke="#a855f7" stroke-width="0.8"/>
      
      <!-- dup3 -->
      <rect x="162" y="50" width="36" height="18" rx="2" fill="#1a0a2a" stroke="#a855f7" stroke-width="0.6"/>
      <text x="180" y="62" fill="#a855f7" text-anchor="middle">dup3</text>
      
      <!-- execveat -->
      <rect x="60" y="76" width="130" height="22" rx="4" fill="#2d0a3d" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow7)">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text x="125" y="91" fill="#ff00ff" font-size="9" text-anchor="middle" font-weight="bold">execveat(fd)</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="420" y="175" fill="#0f6a4a" font-family="monospace" font-size="6.5" text-anchor="middle">AT_EMPTY_PATH · RAM only · ∅ disk</text>
</svg>
