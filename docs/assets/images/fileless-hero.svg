<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#0f0a18"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="560" height="200" fill="url(#bg9)"/>
  
  <!-- LEFT: Traditional execution (detected) -->
  <g transform="translate(45, 20)">
    <rect width="220" height="160" rx="6" fill="#0d0808" stroke="#ff5f56" stroke-width="1" opacity="0.8"/>
    <text x="110" y="18" fill="#ff5f56" font-family="monospace" font-size="8" text-anchor="middle">TRADITIONAL EXECUTION</text>
    
    <g font-family="monospace" font-size="7.5">
      <!-- Download -->
      <rect x="12" y="30" width="76" height="24" rx="3" fill="#0d1a28" stroke="#00b4d8" stroke-width="0.8"/>
      <text x="50" y="40" fill="#48cae4" text-anchor="middle">download</text>
      <text x="50" y="50" fill="#0d3050" text-anchor="middle" font-size="6">wget/curl</text>
      
      <line x1="92" y1="42" x2="102" y2="42" stroke="#4a4a6a" stroke-width="1"/>
      <polygon points="102,42 98,39 98,45" fill="#4a4a6a"/>
      
      <!-- Write to disk -->
      <rect x="106" y="30" width="66" height="24" rx="3" fill="#1a1008" stroke="#eab308" stroke-width="0.8"/>
      <text x="139" y="40" fill="#eab308" text-anchor="middle">write</text>
      <text x="139" y="50" fill="#a08a08" text-anchor="middle" font-size="6">/tmp/implant</text>
      
      <!-- Disk -->
      <rect x="12" y="64" width="196" height="26" rx="3" fill="#1a1410" stroke="#eab308" stroke-width="0.8"/>
      <text x="24" y="78" fill="#eab308" font-size="7">DISK</text>
      <text x="24" y="87" fill="#a08a08" font-size="6">-rwxr-xr-x implant 8.2M</text>
      
      <!-- AV Scan arrow -->
      <line x1="110" y1="90" x2="110" y2="100" stroke="#ff5f56" stroke-width="1"/>
      <polygon points="110,100 107,96 113,96" fill="#ff5f56"/>
      
      <!-- AV scan -->
      <rect x="18" y="102" width="184" height="26" rx="3" fill="#1a0808" stroke="#ff5f56" stroke-width="1.2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
      </rect>
      <text x="110" y="115" fill="#ff5f56" text-anchor="middle" font-size="8">AV / EDR SCAN</text>
      <text x="110" y="125" fill="#993333" text-anchor="middle" font-size="6">signature match · static analysis</text>
      
      <!-- BLOCKED result -->
      <rect x="45" y="136" width="130" height="20" rx="3" fill="#2d0808" stroke="#ff5f56" stroke-width="1.5"/>
      <text x="110" y="150" fill="#ff5f56" text-anchor="middle" font-size="9" font-weight="bold">✗ BLOCKED</text>
    </g>
  </g>
  
  <!-- Center divider -->
  <text x="280" y="102" fill="#3d2d5a" font-family="monospace" font-size="12" text-anchor="middle">vs</text>
  
  <!-- RIGHT: Fileless execution (undetected) -->
  <g transform="translate(295, 20)">
    <rect width="220" height="160" rx="6" fill="#080d0a" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="18" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">FILELESS EXECUTION</text>
    
    <g font-family="monospace" font-size="7.5">
      <!-- Network recv -->
      <rect x="12" y="30" width="76" height="24" rx="3" fill="#0d1a28" stroke="#00b4d8" stroke-width="0.8"/>
      <text x="50" y="40" fill="#48cae4" text-anchor="middle">recvfrom</text>
      <text x="50" y="50" fill="#0d3050" text-anchor="middle" font-size="6">TCP socket</text>
      
      <line x1="92" y1="42" x2="102" y2="42" stroke="#10b981" stroke-width="1">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
      </line>
      <polygon points="102,42 98,39 98,45" fill="#10b981"/>
      
      <!-- memfd (RAM) -->
      <rect x="106" y="30" width="66" height="24" rx="3" fill="#0a1a10" stroke="#10b981" stroke-width="1" filter="url(#glow9)">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="139" y="40" fill="#10b981" text-anchor="middle">memfd</text>
      <text x="139" y="50" fill="#0f6a4a" text-anchor="middle" font-size="6">anon RAM</text>
      
      <!-- RAM block (no disk) -->
      <rect x="12" y="64" width="196" height="26" rx="3" fill="#0a1a10" stroke="#10b981" stroke-width="0.8"/>
      <text x="24" y="78" fill="#10b981" font-size="7">RAM</text>
      <text x="24" y="87" fill="#0f6a4a" font-size="6">memfd:(deleted) — no filesystem path</text>
      
      <!-- AV scan → nothing to scan -->
      <line x1="110" y1="90" x2="110" y2="100" stroke="#3d2d5a" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
      
      <rect x="18" y="102" width="184" height="26" rx="3" fill="#0d0d14" stroke="#3d2d5a" stroke-width="0.8" opacity="0.5"/>
      <text x="110" y="115" fill="#4a4a6a" text-anchor="middle" font-size="8" opacity="0.6">AV / EDR SCAN</text>
      <text x="110" y="125" fill="#3d2d5a" text-anchor="middle" font-size="6">no fs event · no file · nothing to scan</text>
      
      <!-- RUNNING result -->
      <rect x="35" y="136" width="150" height="20" rx="3" fill="#0a2a1a" stroke="#00ff88" stroke-width="1.5" filter="url(#glow9)">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <text x="110" y="150" fill="#00ff88" text-anchor="middle" font-size="9" font-weight="bold">✓ RUNNING</text>
    </g>
  </g>
</svg>
