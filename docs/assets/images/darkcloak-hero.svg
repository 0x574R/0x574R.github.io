<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-dc3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <filter id="glow-dc3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="200" fill="url(#bg-dc3)"/>
  <!-- Central process box with layers being swapped -->
  <g transform="translate(55, 22)">
    <!-- Original layers (left, fading out) -->
    <g opacity="0.35">
      <rect x="0" y="0" width="180" height="156" rx="6" fill="#0d0618" stroke="#ff5555" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="90" y="16" fill="#ff5555" font-family="monospace" font-size="7" text-anchor="middle">ORIGINAL</text>
      <rect x="10" y="24" width="160" height="20" rx="3" fill="#1a0a2e" stroke="#ff5555" stroke-width="0.6"/>
      <text x="90" y="37" fill="#ff5555" font-family="monospace" font-size="7" text-anchor="middle">uid=1000 gid=1000</text>
      <rect x="10" y="48" width="160" height="20" rx="3" fill="#1a0a2e" stroke="#ff5555" stroke-width="0.6"/>
      <text x="90" y="61" fill="#ff5555" font-family="monospace" font-size="7" text-anchor="middle">caps=0x000000000</text>
      <rect x="10" y="72" width="160" height="20" rx="3" fill="#1a0a2e" stroke="#ff5555" stroke-width="0.6"/>
      <text x="90" y="85" fill="#ff5555" font-family="monospace" font-size="7" text-anchor="middle">comm="malware"</text>
      <rect x="10" y="96" width="160" height="20" rx="3" fill="#1a0a2e" stroke="#ff5555" stroke-width="0.6"/>
      <text x="90" y="109" fill="#ff5555" font-family="monospace" font-size="7" text-anchor="middle">argv="malware --exfil"</text>
      <rect x="10" y="120" width="160" height="20" rx="3" fill="#1a0a2e" stroke="#ff5555" stroke-width="0.6"/>
      <text x="90" y="133" fill="#ff5555" font-family="monospace" font-size="7" text-anchor="middle">exe="/tmp/malware"</text>
    </g>
  </g>
  <!-- Arrows showing each layer being replaced -->
  <g transform="translate(250, 22)" font-family="monospace">
    <line x1="0" y1="34" x2="90" y2="34" stroke="#ff79c6" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0s" repeatCount="indefinite"/>
    </line>
    <polygon points="90,34 84,30 84,38" fill="#ff79c6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0s" repeatCount="indefinite"/>
    </polygon>
    <text x="45" y="28" fill="#ff79c6" font-size="6" text-anchor="middle">setresuid</text>

    <line x1="0" y1="58" x2="90" y2="58" stroke="#bd93f9" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <polygon points="90,58 84,54 84,62" fill="#bd93f9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </polygon>
    <text x="45" y="52" fill="#bd93f9" font-size="6" text-anchor="middle">capset</text>

    <line x1="0" y1="82" x2="90" y2="82" stroke="#8be9fd" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <polygon points="90,82 84,78 84,86" fill="#8be9fd">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </polygon>
    <text x="45" y="76" fill="#8be9fd" font-size="6" text-anchor="middle">prctl</text>

    <line x1="0" y1="106" x2="90" y2="106" stroke="#50fa7b" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </line>
    <polygon points="90,106 84,102 84,110" fill="#50fa7b">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </polygon>
    <text x="45" y="100" fill="#50fa7b" font-size="6" text-anchor="middle">mmap</text>

    <line x1="0" y1="130" x2="90" y2="130" stroke="#ffb86c" stroke-width="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </line>
    <polygon points="90,130 84,126 84,134" fill="#ffb86c">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </polygon>
    <text x="45" y="124" fill="#ffb86c" font-size="6" text-anchor="middle">PR_SET_MM</text>
  </g>
  <!-- Cloaked result (right) -->
  <g transform="translate(355, 22)">
    <rect x="0" y="0" width="190" height="156" rx="6" fill="#0d0618" stroke="#50fa7b" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="95" y="16" fill="#50fa7b" font-family="monospace" font-size="7" text-anchor="middle" filter="url(#glow-dc3)">CLOAKED</text>
    <g font-family="monospace" font-size="7">
      <rect x="10" y="24" width="170" height="20" rx="3" fill="#0a1628" stroke="#50fa7b" stroke-width="0.6">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <text x="95" y="37" fill="#50fa7b" text-anchor="middle">uid=0 gid=0</text>
      <rect x="10" y="48" width="170" height="20" rx="3" fill="#0a1628" stroke="#50fa7b" stroke-width="0.6">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
      <text x="95" y="61" fill="#50fa7b" text-anchor="middle">caps=0x3ffffffffff</text>
      <rect x="10" y="72" width="170" height="20" rx="3" fill="#0a1628" stroke="#50fa7b" stroke-width="0.6">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
      <text x="95" y="85" fill="#50fa7b" text-anchor="middle">comm="sshd"</text>
      <rect x="10" y="96" width="170" height="20" rx="3" fill="#0a1628" stroke="#50fa7b" stroke-width="0.6">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      </rect>
      <text x="95" y="109" fill="#50fa7b" text-anchor="middle">argv="sshd: root@pts/0"</text>
      <rect x="10" y="120" width="170" height="20" rx="3" fill="#0a1628" stroke="#50fa7b" stroke-width="0.6">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
      <text x="95" y="133" fill="#50fa7b" text-anchor="middle">exe="/usr/sbin/sshd"</text>
    </g>
  </g>
</svg>
